site_name: analysis_helpers
site_description: Utilities for HEP analysis workflows
site_url: https://cpviolation.github.io/analysis_helpers
repo_url: https://github.com/cpviolation/analysis_helpers
repo_name: analysis_helpers

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true

nav:
  - Home: index.md
  - API Reference:
    - api/index.md
    - asymmetry: api/asymmetry.md
    - dalitz: api/dalitz.md
    - efficiency: api/efficiency.md
    - fit: api/fit.md
    - kinematics: api/kinematics.md
    - latex: api/latex.md
    - plotting: api/plotting.md
    - root_helpers: api/root_helpers.md
    - utils: api/utils.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
